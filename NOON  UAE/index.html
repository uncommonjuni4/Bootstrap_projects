<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noon UAE - Responsive</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <header>
        <div class="container-fluid px-4">
            <div class="row align-items-center">
                <div class="col-auto">
                    <div class="logo"></div>
                </div>
                <div class="col-auto d-none d-md-flex align-items-center">
                    <img class="image-flag me-2" src="image/noon-flag.svg" alt="">
                    <div>
                        <p class="p1">Deliver to</p>
                        <p class="p2">Dubai <i class="fa-solid fa-caret-down"></i></p>
                    </div>
                </div>
                <div class="col">
                    <input class="input1" placeholder="What are you looking for?">
                </div>
                <div class="col-auto d-flex align-items-center gap-3">
                    <button class="nav-btn">English</button>
                    <span class="v-line"></span>
                    <button class="nav-btn">Log in <i class="fa-regular fa-user"></i></button>
                    <span class="v-line"></span>
                    <i class="fa-regular fa-heart fs-5"></i>
                    <i class="fa-solid fa-cart-shopping fs-5"></i>
                </div>
            </div>
        </div>
    </header>

    <div class="panel">
        <div class="container-fluid px-4">
            <a href="">Electronics</a>
            <a href="">Fashion</a>
            <a href="">Home</a>
            <a href="">Kids</a>
            <a href="">Fragrance</a>
            <a href="">Baby</a>
            <a href="">Toys</a>
            <a href="">Sports</a>
        </div>
    </div>

    <div class="hero"></div>
    <div class="hero2"></div>

    <div class="container-fluid px-4">
        <div class="shop-picks">
            <img src="image/shop1.gif" alt="">
            <img src="image/back3.avif" alt="">
            <img src="image/back4.avif" alt="">
            <img src="image/Back5.avif" alt="">
            <img src="image/back6.avif" alt="">
            <img src="image/back14.gif" alt="">
            <img src="image/back10.avif" alt="">
            <img src="image/back11.avif" alt="">
            <img src="image/back12.avif" alt="">
        </div>
    </div>

    <div class="container-fluid px-0 my-3">
        <img src="image/back18.gif" class="w-100" style="height: auto; min-height: 100px;" alt="">
    </div>

    <div class="container">
        <div class="product-section">
            <p class="P2">Women's Fashion</p>
            <div class="product-grid">
                <img src="image/women1.avif" alt="">
                <img src="image/women2.avif" alt="">
                <img src="image/women3.avif" alt="">
                <img src="image/women4.avif" alt="">
                <img src="image/womwn5.avif" alt="">
                <img src="image/women6.avif" alt="">
            </div>
        </div>

        <div class="product-section">
            <p class="P2">Men's Fashion</p>
            <div class="product-grid">
                <img src="image/man1.avif" alt="">
                <img src="image/man2.avif" alt="">
                <img src="image/man3.avif" alt="">
                <img src="image/man4.avif" alt="">
                <img src="image/man5.avif" alt="">
                <img src="image/man6.avif" alt="">
            </div>
        </div>
    </div>

    <footer>
        <div class="container">
            <div class="row">
                <div class="col-6 col-md-2">
                    <h6>ELECTRONICS</h6>
                    <ul>
                        <li><a href="#">Mobiles</a></li>
                        <li><a href="#">Tablets</a></li>
                        <li><a href="#">Laptops</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md-2">
                    <h6>FASHION</h6>
                    <ul>
                        <li><a href="#">Women</a></li>
                        <li><a href="#">Men</a></li>
                        <li><a href="#">Kids</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md-2">
                    <h6>HOME</h6>
                    <ul>
                        <li><a href="#">Kitchen</a></li>
                        <li><a href="#">Bath</a></li>
                        <li><a href="#">Tools</a></li>
                    </ul>
                </div>
                <div class="col-6 col-md-2">
                    <h6>BEAUTY</h6>
                    <ul>
                        <li><a href="#">Fragrance</a></li>
                        <li><a href="#">Makeup</a></li>
                    </ul>
                </div>
            </div>
            <div class="row mt-5 text-center">
                <div class="col-12 foot-logo">
                    <img src="image/google-play.svg" alt="">
                    <img src="image/app-store.svg" alt="">
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
